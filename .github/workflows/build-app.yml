name: Build App

on:
  # push:
  #   branches: [ main, master ]
  #   tags: [ 'v*' ]
  # pull_request:
  #   branches: [ main, master ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.9.13'
  # 平台构建开关（设为 false 可跳过对应平台的构建）
  BUILD_WINDOWS: true
  BUILD_LINUX_AMD64: true
  BUILD_LINUX_ARM64: true
  BUILD_LINUX_RISCV64: false
  BUILD_MACOS_AMD64: true    # 在 ARM64 运行器上构建 x86_64 版本
  BUILD_MACOS_ARM64: false   # 原生 ARM64 构建（如需可改为 true）

permissions:
  contents: write

jobs:
  build-info:
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.release-info.outputs.prerelease }}
      version: ${{ steps.release-info.outputs.version }}
      release_notes: ${{ steps.release-info.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4

      - name: Get Release Version And Notes
        id: release-info
        run: |
          CHANGE_LOG_FILE="${{ github.workspace }}/CHANGELOG.md"
          
          CHANGE_VER=$(awk '/^## / {print $2; exit}' "${CHANGE_LOG_FILE}")
          prerelease='true'
          version="${CHANGE_VER}-$(date +'%Y%m%d%H%M%S')"
          if git ls-remote --tags origin "refs/tags/$CHANGE_VER*" | grep -q .; then
            echo "存在 $CHANGE_VER 开头的 tag"
          else
            echo "不存在 $CHANGE_VER 开头的 tag"
            prerelease='false'
            version="${CHANGE_VER}"
          fi
          
          awk -v ver="$CHANGE_VER" '
                $0 ~ "^## " ver { found=1; next }
                found && $0 ~ "^## " { exit }
                found { print }
              ' "${CHANGE_LOG_FILE}" > release_notes.txt
          # 检查是否提取到内容
          if [ ! -s release_notes.txt ]; then
              echo "- 草稿预发布版本" > release_notes.txt
          fi
          
          echo '是否正式版: '$([[ "$prerelease" == "false" ]] && echo "是" || echo "否")
          echo "构建版本: ${version}"            
          echo "变更日志: $(cat release_notes.txt)"            
          
          echo "prerelease=${prerelease}" >> $GITHUB_OUTPUT
          echo "version=${version}" >> $GITHUB_OUTPUT
          {
            echo "release_notes<<EOF"
            cat release_notes.txt
            echo "EOF"
          } >> $GITHUB_OUTPUT

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd frontend
          npm install
      - name: Build frontend
        run: |
          cd frontend
          npm run build
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  build-windows-amd64:
    if: ${{ env.BUILD_WINDOWS == 'true' }}
    needs: build-frontend
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Upgrade pip
      run: |
        pip install --upgrade pip
    - name: Download frontend
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist
    - name: Build
      run: |
        cd backend
        python build.py
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-x64
        path: backend/dist/*.zip

  build-linux-amd64:
    if: ${{ env.BUILD_LINUX_AMD64 == 'true' }}
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Upgrade pip
      run: |
        pip install --upgrade pip
    - name: Download frontend
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

    - name: Build
      run: |
        cd backend
        python3 build.py
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-x64
        path: backend/dist/*.zip

  build-linux-arm64:
    if: ${{ env.BUILD_LINUX_ARM64 == 'true' }}
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Download frontend
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

    - name: Build in ARM64 container
      run: |
        docker run --rm --platform linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          -e CI=true \
          -e GITHUB_ACTIONS=true \
          python:${{ env.PYTHON_VERSION }}-slim \
          bash -c "
            export PIP_ROOT_USER_ACTION=ignore
            apt-get update && apt-get install -y binutils &&
            pip install --upgrade pip &&
            cd backend &&
            python3 build.py
          "
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-arm64
        path: backend/dist/*.zip

  build-linux-riscv64:
    if: ${{ env.BUILD_LINUX_RISCV64 == 'true' }}
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: riscv64

    - name: Download frontend
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

    - name: Build in RISC-V64 container
      run: |
        docker run --rm --platform linux/riscv64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          -e CI=true \
          -e GITHUB_ACTIONS=true \
          riscv64/python \
          bash -c "
            export PIP_ROOT_USER_ACTION=ignore
            apt-get update && apt-get install -y binutils &&
            pip install --upgrade pip &&
            cd backend &&
            python3 build.py
          "
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-riscv64
        path: backend/dist/*.zip

  build-macos-amd64:
    if: ${{ env.BUILD_MACOS_AMD64 == 'true' }}
    needs: build-frontend
    runs-on: macos-latest          # ARM64 运行器，内置 Rosetta 2
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python (x86_64)
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        architecture: 'x64'        # 强制安装 Intel 版 Python

    - name: Upgrade pip (x86_64)
      run: |
        arch -x86_64 pip install --upgrade pip

    - name: Download frontend
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

    - name: Build (x86_64)
      run: |
        cd backend
        arch -x86_64 python3 build.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-x64
        path: backend/dist/*.zip

  build-macos-arm64:
    if: ${{ env.BUILD_MACOS_ARM64 == 'true' }}
    needs: build-frontend
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        architecture: arm64

    - name: Upgrade pip
      run: |
        pip install --upgrade pip
    - name: Download frontend
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

    - name: Build
      run: |
        cd backend
        python3 build.py
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-arm64
        path: backend/dist/*.zip

  release:
    needs: [build-info, build-windows-amd64, build-linux-amd64, build-linux-arm64, build-linux-riscv64, build-macos-amd64, build-macos-arm64]
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/*/*.zip
          artifacts/*/*.fpk
        name: ${{ needs.build-info.outputs.version }}
        tag_name: ${{ needs.build-info.outputs.version }}
        draft: ${{ needs.build-info.outputs.prerelease == 'true' }}
        prerelease: ${{ needs.build-info.outputs.prerelease == 'true' }}
        body: ${{ needs.build-info.outputs.release_notes }}
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}