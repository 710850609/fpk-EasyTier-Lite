name: Build App

on:
  # push:
  #   branches: [ main, master ]
  #   tags: [ 'v*' ]
  # pull_request:
  #   branches: [ main, master ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.9.13'

jobs:
  build-info:
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.release-info.outputs.prerelease }}
      version: ${{ steps.release-info.outputs.version }}
      release_notes: ${{ steps.release-info.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4

      - name: Get Release Version And Notes
        id: release-info
        run: |
          CHANGE_LOG_FILE="${{ github.workspace }}/CHANGELOG.md"
          
          CHANGE_VER=$(awk '/^## / {print $2; exit}' "${CHANGE_LOG_FILE}")
          prerelease='true'
          version="${CHANGE_VER}-$(date +'%Y%m%d%H%M%S')"
          if git ls-remote --tags origin "refs/tags/$CHANGE_VER*" | grep -q .; then
            echo "存在 $CHANGE_VER 开头的 tag"
          else
            echo "不存在 $CHANGE_VER 开头的 tag"
            prerelease='false'
            version="${CHANGE_VER}"
          fi
          
          awk -v ver="$CHANGE_VER" '
                $0 ~ "^## " ver { found=1; next }
                found && $0 ~ "^## " { exit }
                found { print }
              ' "${CHANGE_LOG_FILE}" > release_notes.txt
          # 检查是否提取到内容
          if [ ! -s release_notes.txt ]; then
              echo "- 草稿预发布版本" > release_notes.txt
          fi
          
          echo '是否正式版: '$([[ "$prerelease" == "false" ]] && echo "是" || echo "否")
          echo "构建版本: ${version}"            
          echo "变更日志: $(cat release_notes.txt)"            
          
          echo "prerelease=${prerelease}" >> $GITHUB_OUTPUT
          echo "version=${version}" >> $GITHUB_OUTPUT
          {
            echo "release_notes<<EOF"
            cat release_notes.txt
            echo "EOF"
          } >> $GITHUB_OUTPUT
          
    

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # Windows AMD64
  build-windows-amd64:
    needs: build-frontend
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Upgrade pip
      run: |
        pip install --upgrade pip

    - name: Download frontend
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

    - name: Build
      run: |
        cd backend
        python build.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-x64
        path: backend/dist/*.zip

  # Linux AMD64
  build-linux-amd64:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Upgrade pip
      run: |
        pip install --upgrade pip

    - name: Download frontend
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

    - name: Build
      run: |
        cd backend
        python3 build.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-x64
        path: backend/dist/*.zip

  # Linux ARM64 (使用 QEMU 模拟)
  build-linux-arm64:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Download frontend
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist
    
    - name: Build in ARM64 container
      run: |
        docker run --rm --platform linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          python:${{ env.PYTHON_VERSION }}-slim \
          bash -c "
            export PIP_ROOT_USER_ACTION=ignore
            apt-get update && apt-get install -y binutils &&
            pip install --upgrade pip &&
            cd backend &&
            python3 build.py
          "
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-arm64
        path: backend/dist/*.zip

  # Linux RISC-V 64 (使用 QEMU 模拟)
  build-linux-riscv64:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: riscv64

    - name: Download frontend
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

    - name: Build in RISC-V64 container
      run: |
        docker run --rm --platform linux/riscv64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          riscv64/python \
          bash -c "
            export PIP_ROOT_USER_ACTION=ignore
            apt-get update && apt-get install -y binutils &&
            pip install --upgrade pip &&
            cd backend &&
            python3 build.py
          "

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-riscv64
        path: backend/dist/*.zip


  # macOS AMD64
  build-macos-amd64:
    needs: build-frontend
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Upgrade pip
      run: |
        pip install --upgrade pip

    - name: Download frontend
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

    - name: Build
      run: |
        cd backend
        python3 build.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-x64
        path: backend/dist/*.zip

  # macOS ARM64 (Apple Silicon)
  build-macos-arm64:
    needs: build-frontend
    runs-on: macos-14  # macOS 14 支持 ARM64
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        architecture: arm64
    
    - name: Upgrade pip
      run: |
        pip install --upgrade pip

    - name: Download frontend
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

    - name: Build
      run: |
        cd backend
        python3 build.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-arm64
        path: backend/dist/*.zip

  # 发布 Release
  release:
    needs: [build-info, build-windows-amd64, build-linux-amd64, build-linux-arm64, build-linux-riscv64, build-macos-amd64, build-macos-arm64]
#    needs: [build-info, build-windows-amd64, build-linux-amd64]
    runs-on: ubuntu-latest
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/*/*.zip
          artifacts/*/*.fpk
        name: ${{ needs.build-info.outputs.version }}
        tag_name: ${{ needs.build-info.outputs.version }}
        draft: ${{ needs.build-info.outputs.prerelease == 'true' }}
        prerelease: ${{ needs.build-info.outputs.prerelease == 'true' }}
        body: ${{ needs.build-info.outputs.release_notes }}
        fail_on_unmatched_files: false   # 可选，如果没有匹配文件则报错
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
