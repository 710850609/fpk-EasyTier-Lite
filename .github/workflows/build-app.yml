name: Build App

on:
  # push:
  #   branches: [ main, master ]
  #   tags: [ 'v*' ]
  # pull_request:
  #   branches: [ main, master ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.9.13'

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # Windows AMD64
  build-windows-amd64:
    needs: build-frontend
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Upgrade pip
      run: |
        pip install --upgrade pip

    - name: Download frontend
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

    - name: Build
      run: |
        cd backend
        python build.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-x64
        path: dist/EasyTier-Lite-windows-x64.zip

  # Linux AMD64
  build-linux-amd64:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Upgrade pip
      run: |
        pip install --upgrade pip

    - name: Download frontend
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

    - name: Build
      run: |
        cd backend
        python3 build.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-x64
        path: dist/EasyTier-Lite-linux-x64.zip

  # Linux ARM64 (使用 QEMU 模拟)
  build-linux-arm64:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64
    
    - name: Build in ARM64 container
      run: |
        docker run --rm --platform linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          python:${{ env.PYTHON_VERSION }}-slim \
          bash -c "
            apt-get update && apt-get install -y binutils &&
            pip install --upgrade pip &&
            pip install pyinstaller pystray pillow &&
            cd src/gui &&
            python build_stray.py
          "
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: tray-linux-arm64
        path: dist/EasyTierLite-Tray-linux-arm64

  # macOS AMD64
  build-macos-amd64:
    needs: build-frontend
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Upgrade pip
      run: |
        pip install --upgrade pip

    - name: Download frontend
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

    - name: Build
      run: |
        cd backend
        python3 build.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-x64
        path: dist/EasyTierLite-macos-x64.zip

  # macOS ARM64 (Apple Silicon)
  build-macos-arm64:
    needs: build-frontend
    runs-on: macos-14  # macOS 14 支持 ARM64
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        architecture: arm64
    
    - name: Upgrade pip
      run: |
        pip install --upgrade pip

    - name: Download frontend
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

    - name: Build
      run: |
        cd backend
        python3 build.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-arm64
        path: dist/EasyTierLite-macos-arm64.zip

  # 发布 Release
  release:
    needs: [build-windows-amd64, build-linux-amd64, build-linux-arm64, build-macos-amd64, build-macos-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/windows-x64/EasyTierLite-windows-x64.zip
          artifacts/linux-x64/EasyTierLite-linux-x64.zip
          artifacts/linux-arm64/EasyTierLite-linux-arm64.zip
          artifacts/macos-x64/EasyTierLite-macos-x64.zip
          artifacts/macos-arm64/EasyTierLite-macos-arm64.zip
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
