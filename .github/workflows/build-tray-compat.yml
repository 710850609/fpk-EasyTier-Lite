name: Build Tray App (Compatible)

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version for standard builds'
        required: true
        default: '3.12'
        type: choice
        options:
          - '3.7.17'  # Win7/统信OS 兼容
          - '3.8.18'  # Win7/现代Linux 兼容
          - '3.9.13'  # 现代系统
          - '3.10'    # 现代系统
          - '3.11'    # 现代系统
          - '3.12'    # 现代系统 (推荐)

env:
  PYTHON_VERSION: ${{ github.event.inputs.python_version }}
  STATIC_PYTHON_VERSION: '3.12'  # 静态链接和 AppImage 使用最新版

jobs:
  # Linux AMD64 (使用旧版 glibc 兼容)
  build-linux-amd64:
    runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libappindicator3-dev gir1.2-appindicator3-0.1
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip --root-user-action=ignore
        pip install pyinstaller pystray pillow
    
    - name: Build
      run: |
        cd src/gui
        python build_stray.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: tray-linux-x64-py${{ env.PYTHON_VERSION }}
        path: dist/EasyTierLite-Tray-linux-x64

  # Linux AMD64 - 静态链接 (Python 3.12, 无 GTK 依赖)
  build-linux-static:
    runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.STATIC_PYTHON_VERSION }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libappindicator3-dev gir1.2-appindicator3-0.1 patchelf
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip --root-user-action=ignore
        pip install pyinstaller pystray pillow staticx
    
    - name: Build with static linking
      run: |
        cd src/gui
        python build_stray_static.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: tray-linux-x64-static-py${{ env.STATIC_PYTHON_VERSION }}
        path: dist/EasyTierLite-Tray-linux-x64-static

  # Linux AMD64 - AppImage (Python 3.12, 双击运行)
  build-linux-appimage:
    runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.STATIC_PYTHON_VERSION }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libappindicator3-dev gir1.2-appindicator3-0.1 \
          desktop-file-utils libfuse2 curl
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip --root-user-action=ignore
        pip install pyinstaller pystray pillow
    
    - name: Build AppImage
      run: |
        cd src/gui
        python build_appimage.py
      continue-on-error: true  # AppImage 构建可能失败，不影响其他任务
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: tray-linux-x64-appimage
        path: dist/*.AppImage

  # Linux ARM64
  build-linux-arm64:
    runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64
    
    - name: Build in ARM64 container
      run: |
        docker run --rm --platform linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          python:${{ env.PYTHON_VERSION }}-slim \
          bash -c "
            apt-get update && apt-get install -y binutils libgtk-3-dev libappindicator3-dev gir1.2-appindicator3-0.1 &&
            pip install --upgrade pip --root-user-action=ignore &&
            pip install pyinstaller pystray pillow &&
            cd src/gui &&
            python build_stray.py
          "
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: tray-linux-arm64-py${{ env.PYTHON_VERSION }}
        path: dist/EasyTierLite-Tray-linux-arm64

  # Windows AMD64
  build-windows-amd64:
    runs-on: windows-2019
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pyinstaller pystray pillow
    
    - name: Build
      run: |
        cd src/gui
        python build_stray.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: tray-windows-x64-py${{ env.PYTHON_VERSION }}
        path: dist/EasyTierLite-Tray-windows-x64.exe

  # macOS AMD64
  build-macos-amd64:
    runs-on: macos-12
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pyinstaller pystray pillow
    
    - name: Build
      run: |
        cd src/gui
        python build_stray.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: tray-macos-x64-py${{ env.PYTHON_VERSION }}
        path: dist/EasyTierLite-Tray-macos-x64

  # macOS ARM64
  build-macos-arm64:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        architecture: arm64
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pyinstaller pystray pillow
    
    - name: Build
      run: |
        cd src/gui
        python build_stray.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: tray-macos-arm64-py${{ env.PYTHON_VERSION }}
        path: dist/EasyTierLite-Tray-macos-arm64

  # 统信OS 专用构建 (使用系统 Python 3.7)
  build-uos:
    runs-on: ubuntu-20.04
    container:
      image: debian:10-slim
    steps:
    - uses: actions/checkout@v4
    
    - name: Install system dependencies
      run: |
        apt-get update
        apt-get install -y python3 python3-pip python3-gi python3-gi-cairo \
          gir1.2-gtk-3.0 gir1.2-appindicator3-0.1 libgtk-3-0 libappindicator3-1
    
    - name: Install Python dependencies
      run: |
        pip3 install --upgrade pip
        pip3 install pyinstaller pystray pillow
    
    - name: Build
      run: |
        cd src/gui
        python3 build_stray.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: tray-uos-x64
        path: dist/EasyTierLite-Tray-linux-x64
