name: release fpk

on:
  push:
    tags:
      - '*'
  workflow_dispatch: {}

permissions:
  contents: write

env:
  NODE_VERSION: "24"
  PYTHON_VERSION: '3.11'

jobs:  
  # 主 job，负责设置变量
  setup:
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.set-tag.outputs.prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set tag and prerelease info
        id: set-tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF##*/}"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            TAG="main"
          else
            TAG="build-${GITHUB_RUN_NUMBER}"
          fi
          
          if [[ "$TAG" == build-* ]] || [[ "${TAG}" == *dev* ]] || [[ "${TAG}" == *pre* ]] || [[ "${TAG}" == *beta* ]]; then
            PRE=true
          else
            PRE=false
          fi
          
          echo "prerelease=$PRE" >> $GITHUB_OUTPUT
          echo "prerelease: $PRE"

  build-multi-arch:
    needs: setup
    outputs:
      release_version: ${{ steps.release-info.outputs.version }}
      release_notes: ${{ steps.release-info.outputs.release_notes }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-latest
          # - arch: riscv64
          #   runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run build
        run: |
          echo "开始构建架构: ${{ matrix.arch }}"
          chmod +x ./version-util.sh 2>/dev/null || true
          chmod +x ./fnpack.sh 2>/dev/null || true
          chmod +x ./build.sh 2>/dev/null || true
          ./build.sh arch=${{ matrix.arch }} build_pre="${{ needs.setup.outputs.prerelease }}" build_all="true" download_proxy="false" 2>/dev/null || true

      - name: Prepare artifact
        run: |
          FPK_FILE=$(ls *.fpk 2>/dev/null | head -1)
          if [ -z "$FPK_FILE" ]; then
            echo "错误：未找到.fpk文件"
            ls -la
            exit 1
          fi
          
          mkdir -p release
          cp "$FPK_FILE" "release/$FPK_FILE"
          echo "准备完成: $FPK_FILE"

      - name: Get release version
        id: release-info
        run: |
          FPK_FILE=$(ls *.fpk 2>/dev/null | head -1)
          if [ -z "$FPK_FILE" ]; then
            echo "错误：未找到.fpk文件"
            ls -la
            echo "version='0-error'" >> $GITHUB_OUTPUT
            exit 1
          fi
          # 读取版本号
          release_version=$(sed -n 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*//p' ./EasyTier-Lite/manifest | sed 's/^"\|"$//g')
          echo "从manifest中获取release_version: $release_version"
          echo "version=$release_version" >> $GITHUB_OUTPUT

          if [[ "${{ needs.setup.outputs.prerelease }}" == "true" ]]; then
            echo "release_notes=''" >> $GITHUB_OUTPUT
          else
            awk -v ver="$release_version" '
                $0 ~ "^## " ver { found=1; next }
                found && $0 ~ "^## " { exit }
                found { print }
              ' "${{ github.workspace }}/CHANGELOG.md" > release_notes.txt
            # 检查是否提取到内容
            if [ ! -s release_notes.txt ]; then
              echo "- 更新 EasyTier-Lite 版本" > release_notes.txt
            fi
            echo "更新日志: $(cat release_notes.txt)"            
            {
              echo "release_notes<<EOF"
              cat release_notes.txt
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpk-${{ matrix.arch }}
          path: release/
          retention-days: 1

  create-release:
    needs: 
      - setup
      - build-multi-arch
    runs-on: ubuntu-latest
    steps:
      - name: Create release directory
        run: |
          mkdir -p combined-release
    
      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: fpk-amd64
          path: combined-release

      - name: Download aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: fpk-aarch64
          path: combined-release

      # - name: Download riscv64 artifact
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: fpk-riscv64
      #     path: combined-release

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ needs.build-multi-arch.outputs.release_version }}
          tag: "${{ needs.build-multi-arch.outputs.release_version }}"
          artifacts: "combined-release/*"
          prerelease: ${{ needs.setup.outputs.prerelease }}
          skipIfReleaseExists: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: ${{ needs.build-multi-arch.outputs.release_notes }}

      - name: Upload release summary
        if: always()
        run: |
          echo "=== 发布总结 ==="
          echo "代码分支/标签: ${{ needs.build-multi-arch.outputs.release_version }}"
          echo "版本:  ${{ needs.build-multi-arch.outputs.release_version }}"
          echo "预发布: ${{ needs.setup.outputs.prerelease }}"
          echo "包含的文件:"
          ls -la combined-release/
          echo "================"

      - name: Push FnDepot
        if: ${{ needs.setup.outputs.prerelease == 'false' }}
        run: |
          new_version="${{ needs.build-multi-arch.outputs.release_version }}"
          changelog="${{ needs.build-multi-arch.outputs.release_notes }}"
          
          gh workflow run update-version.yml \
            --repo "710850609/FnDepot" \
            -f app_name="EasyTier-Lite" \
            -f new_version="$new_version" \
            -f download_url_amd64="https://github.com/710850609/fpk-EasyTier-Lite/releases/download/$new_version/EasyTier-Lite-x86_64-$new_version.fpk" \
            -f download_url_aarch64="https://github.com/710850609/fpk-EasyTier-Lite/releases/download/$new_version/EasyTier-Lite-aarch64-$new_version.fpk" \
            -f changelog="$changelog"
        env:
          GH_TOKEN: ${{ secrets.FNDEPOT_TOKEN }}