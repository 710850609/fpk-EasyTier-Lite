name: Build Multi-Platform

on:
  push:
    branches: [main1, master1]
    tags: ['pre/*']
  pull_request:
    branches: [main1, master1]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.8'
  PYTHONIOENCODING: 'utf-8'

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  build-windows:
    needs: build-frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Windows x64
        run: |
          cd src/backend
          python build.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyTierLite-Server-windows-x64
          path: src/backend/dist/*.zip

  build-linux-x64:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Linux x64
        run: |
          cd src/backend
          python build.py

      - name: Upload Linux x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyTierLite-Server-linux-x64
          path: src/backend/dist/*.zip

  build-linux-arm64:
    needs: build-frontend
    runs-on: ubuntu-18.04-arm
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: 'arm64'  # 明确指定 ARM 架构
      
      - name: Check Python version
        run: python --version  # 将输出您指定的 Python 版本，如 3.8.x
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build Linux arm64
        run: |
          cd src/backend
          python build.py

      - name: Upload Linux arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyTierLite-Server-linux-arm64
          path: src/backend/dist/*.zip


    # runs-on: ubuntu-latest
    # steps:
    #   - uses: actions/checkout@v4

    #   - name: Download frontend artifact
    #     uses: actions/download-artifact@v4
    #     with:
    #       name: frontend-dist
    #       path: frontend/dist

    #   - name: Set up QEMU
    #     uses: docker/setup-qemu-action@v3
    #     with:
    #       platforms: arm64

    #   - name: Build Linux ARM64
    #     uses: uraimo/run-on-arch-action@v2
    #     with:
    #       arch: aarch64
    #       distro: ubuntu18.04
    #       githubToken: ${{ github.token }}
    #       install: |
    #         apt-get update -q -y
    #         apt-get install -q -y python3 python3-pip
    #       run: |
    #         cd src/backend
    #         python3 build.py

    #   - name: Upload Linux ARM64 artifact
    #     uses: actions/upload-artifact@v4
    #     with:
    #       name: EasyTierLite-Server-linux-arm64
    #       path: src/backend/dist/*.zip

  build-macos-x64:
    needs: build-frontend
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build macOS x64
        run: |
          cd src/backend
          python build.py

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyTierLite-Server-macos-x64
          path: src/backend/dist/*.zip

  release:
    needs: [build-windows, build-linux-x64, build-linux-arm64, build-macos-x64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/EasyTierLite-Server-windows-x64/*.zip
            artifacts/EasyTierLite-Server-linux-x64/*.zip
            artifacts/EasyTierLite-Server-linux-arm64/*.zip
            artifacts/EasyTierLite-Server-macos-x64/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
