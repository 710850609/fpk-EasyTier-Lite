<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器状态表</title>
    <style>
        /* CSS 变量定义 - 支持暗黑模式 */
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: #ddd;
            --header-bg: #f2f2f2;
            --hover-bg: #f5f5f5;
            --local-color: #0066cc;
            --direct-color: #009900;
            --shadow-color: rgba(0,0,0,0.1);
        }

        /* 暗黑模式样式 - 系统偏好 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --text-color: #e0e0e0;
                --border-color: #444;
                --header-bg: #2d2d2d;
                --hover-bg: #333333;
                --local-color: #4da6ff;
                --direct-color: #66ff66;
                --shadow-color: rgba(255,255,255,0.1);
            }
        }

        /* 手动暗黑模式类 - 强制深色 */
        body.dark-mode {
            --bg-color: #1a1a1a !important;
            --text-color: #e0e0e0 !important;
            --border-color: #444 !important;
            --header-bg: #2d2d2d !important;
            --hover-bg: #333333 !important;
            --local-color: #4da6ff !important;
            --direct-color: #66ff66 !important;
            --shadow-color: rgba(255,255,255,0.1) !important;
        }

        /* 手动浅色模式类 - 强制浅色 */
        body.light-mode {
            --bg-color: #ffffff !important;
            --text-color: #333333 !important;
            --border-color: #ddd !important;
            --header-bg: #f2f2f2 !important;
            --hover-bg: #f5f5f5 !important;
            --local-color: #0066cc !important;
            --direct-color: #009900 !important;
            --shadow-color: rgba(0,0,0,0.1) !important;
        }

        /* 暗黑模式下的按钮样式 */
        body.dark-mode .download-btn {
            background: #3a3a3a;
            border-color: #555;
        }

        body.dark-mode .download-btn.primary {
            background: #3375b9;
            border-color: #3375b9;
            color: white;
        }

        body.dark-mode .download-btn.success {
            background: #5daf34;
            border-color: #5daf34;
            color: white;
        }

        body.dark-mode .download-btn.info {
            background: #82848a;
            border-color: #82848a;
            color: white;
        }

        /* 基础样式 */
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
            font-size: 16px;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* 下载按钮区域 - Element-UI 风格 */
        .button-container {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            line-height: 1;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            background: var(--header-bg);
            color: var(--text-color);
            min-width: 120px;
        }
        
        .download-btn:hover {
            opacity: 0.8;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px var(--shadow-color);
        }
        
        .download-btn:active {
            transform: translateY(0);
        }
        
        .download-btn.primary {
            background: #409eff;
            color: white;
            border-color: #409eff;
        }
        
        .download-btn.success {
            background: #67c23a;
            color: white;
            border-color: #67c23a;
        }
        
        .download-btn.info {
            background: #909399;
            color: white;
            border-color: #909399;
        }
        
        .download-btn .icon {
            margin-right: 6px;
            font-size: 16px;
        }
        
        /* 暗黑模式切换按钮 */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--header-bg);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .theme-toggle:hover {
            transform: scale(1.1);
        }
        
        /* 表格容器，添加水平滚动 */
        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 800px;
            border: 1px solid var(--border-color);
            font-size: 16px;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
            transition: background-color 0.3s ease;
        }
        
        th {
            background-color: var(--header-bg);
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        
        /* 固定首列 */
        th:first-child,
        td:first-child {
            position: sticky;
            left: 0;
            background-color: var(--header-bg);
            z-index: 2;
            font-weight: bold;
        }
        
        /* 确保首列在hover时保持背景色 */
        tr:hover td:first-child {
            background-color: var(--hover-bg);
        }
        
        tr:hover {
            background-color: var(--hover-bg);
        }
        
        .local {
            color: var(--local-color);
            font-weight: bold;
        }
        
        .direct {
            color: var(--direct-color);
            font-weight: bold;
        }
        
        /* 响应式样式 */
        @media (max-width: 768px) {
            body {
                margin: 5px;
                font-size: 16px;
            }
            
            .button-container {
                gap: 8px;
            }
            
            .download-btn {
                padding: 8px 16px;
                font-size: 13px;
                min-width: 100px;
            }
            
            table {
                font-size: 16px;
            }
            
            th, td {
                padding: 8px;
            }
        }
        
        @media (max-width: 480px) {
            body {
                font-size: 14px;
            }
            
            .button-container {
                flex-direction: column;
                align-items: stretch;
            }
            
            .download-btn {
                width: 100%;
                justify-content: center;
            }
            
            table {
                font-size: 14px;
            }
            
            th, td {
                padding: 8px;
            }
            
            .theme-toggle {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="table-container">
        <table id="serverTable">
            <thead>
                <tr id="tableHeader">
                    <!-- 表头将通过JavaScript动态生成 -->
                </tr>
            </thead>
            <tbody>
                <!-- 数据将通过JavaScript动态填充 -->
            </tbody>
        </table>
    </div>
    <!-- 下载按钮区域 -->
    <br></br>
    <div class="button-container">
        <button class="download-btn primary" onclick="downloadConfig()">
            <span class="icon">⚙️</span>
            下载配置文件
        </button>
        <button class="download-btn primary" onclick="downloadWindows()">
            <span class="icon">💻</span>
            下载Win版本
        </button>
        <button class="download-btn primary" onclick="downloadAndroid()">
            <span class="icon">📱</span>
            下载安卓版本
        </button>
        <button class="download-btn primary" onclick="copy2CuttingBoard(`https://testflight.apple.com/join/YWnDyJfM`)" hov>
            <span class="icon">📱</span>
            IOS TestFlight 链接
        </button>
        <button class="download-btn primary" onclick="reload()">
            <span class="icon">🦖</span>
            刷新
        </button>
    </div>

    <script>
        // 模拟API接口地址（实际使用时替换为真实接口）
        const API_URL = '/cgi/ThirdParty/EasyTier-Lite/api.cgi/';
        // Mock数据
        const fallbackData = [
            {"cidr": "10.0.0.0/24", "ipv4": "10.0.0.0", "hostname": "FeiNiu", "cost": "Local", "lat_ms": "-", "loss_rate": "-", "rx_bytes": "-", "tx_bytes": "-", "tunnel_proto": "-", "nat_type": "Restricted", "id": "1470628219", "version": "2.5.0-88a45d11"}, {"cidr": "", "ipv4": "", "hostname": "tencent-vm", "cost": "p2p", "lat_ms": "40.73", "loss_rate": "2.0%", "rx_bytes": "18.07 MB", "tx_bytes": "3.46 MB", "tunnel_proto": "BodyUrls-tcp://et.sbgov.cn:11010,BodyUrls-tcp://et3.sbgov.cn:11010", "nat_type": "Unknown", "id": "3677262003", "version": "2.4.5-4c4d172e"}, {"cidr": "", "ipv4": "", "hostname": "zheyimiaowangluo", "cost": "p2p", "lat_ms": "61.16", "loss_rate": "0.0%", "rx_bytes": "224.94 kB", "tx_bytes": "603.36 kB", "tunnel_proto": "BodyUrls-tcp://et2.sbgov.cn:11010", "nat_type": "Restricted", "id": "150136517", "version": "2.4.5-4c4d172e"},
        ];
        const keyMap = {
            "cidr": "网段",
            // "ipv4": "虚拟IPv4",
            "hostname": "主机名",
            "cost": "穿透方式",
            "lat_ms": "延迟",
            "loss_rate": "丢包率",
            "rx_bytes": "下载", 
            "tx_bytes": "上传",
            "nat_type": "Nat类型",
            "tunnel_proto": "协议",
            // "id": "id",
            "version": "内核版本"
        };
        const valueMap = {
            "cost": {
                "p2p": "直连",
                "relay": "中继",
                "Local": "本地",
            },
            "nat_type": {
                "NoPAT" : "公网NoPAT",
                "FullCone" : "Nat1全锥",
                "Restricted" : "Nat2受限",
                "PortRestricted" : "Nat3端口受限",
                "Symmetric" : "Nat4对称",
                "OpenInternet" : "开放互联网",
                "Unknown" : "未知",
            },
            "hostname": {
                "PublicServer_": ""
            }
        };
        const classNameMap = {
            "cost": {
                "Local": "local",
                "p2p": "direct",
            },
        };


        function reload() {
            window.location.href = window.location.href
            // fetchServerData();
        }
        // 简单的通知函数
        function toast(message, type = 'info') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: ${type === 'success' ? '#67c23a' : type === 'error' ? '#f56c6c' : '#409EFF'};
                color: white;
                padding: 12px 24px;
                border-radius: 4px;
                box-shadow: 0 2px 12px rgba(0,0,0,0.1);
                z-index: 2000;
                font-size: 14px;
                opacity: 0;
                transition: opacity 0.3s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            // 显示动画
            setTimeout(() => {
                notification.style.opacity = '1';
            }, 100);
            
            // 自动隐藏
            setTimeout(() => {
                notification.style.opacity = '0';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        // 主题管理
        class ThemeManager {
            constructor() {
                this.themeIcon = document.getElementById('themeIcon');
                this.init();
            }

            init() {
                // 检查本地存储的主题设置
                this.followFnOSTheme();
                window.addEventListener('storage', (e) => {
                    if (e.key === 'fnos-theme-mode') {
                        this.followFnOSTheme();
                    }
                });
            }

            followFnOSTheme() {
                const fnTheme = localStorage.getItem('fnos-theme-mode');
                if (fnTheme == "10") {
                    this.setTheme('light');
                } else if (fnTheme == "20") {
                    this.setTheme('dark');
                } else {
                    // 否则跟随系统设置
                    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    this.setTheme(prefersDark ? 'dark' : 'light');
                }
            }

            setTheme(theme) {
                document.body.classList.remove('light-mode', 'dark-mode');                
                if (theme === 'dark') {
                    document.body.classList.add('dark-mode');
                } else if (theme === 'light') {
                    document.body.classList.add('light-mode');
                }
                const themeToggle = document.querySelector('.theme-toggle');
                if (themeToggle) {
                    const themeIcon = themeToggle.querySelector('#themeIcon');
                    if (themeIcon) {
                        themeIcon.textContent = theme === 'dark' ? '☀️' : '🌙';
                        themeToggle.title = theme === 'dark' ? '切换到浅色模式' : '切换到深色模式';
                    }
                }
            }
        }
        // 初始化主题管理器
        const themeManager = new ThemeManager();

        // 生成表头函数
        function generateTableHeader() {
            const headerRow = document.querySelector('#tableHeader');
            headerRow.innerHTML = '';            
            Object.keys(keyMap).forEach(key => {
                const th = document.createElement('th');
                th.textContent = keyMap[key];
                headerRow.appendChild(th);
            });
        }

         function sortPeer(data) {
            const sorted = data.sort((a, b) => {
                const hasIpA = a.ipv4 && a.ipv4.trim() !== '';
                const hasIpB = b.ipv4 && b.ipv4.trim() !== '';                
                // ipv4 空的放最后
                if (!hasIpA && !hasIpB) return 0;
                if (!hasIpA) return 1;
                if (!hasIpB) return -1;                
                // 有 ipv4 的按数值升序
                return a.ipv4 > b.ipv4;
            });
        }

        // 填充表格函数
        function populateTable(data) {
            sortPeer(data);
            const tableBody = document.querySelector('#serverTable tbody');
            // 清空表格
            tableBody.innerHTML = '';
            
            data.forEach(server => {
                const row = document.createElement('tr');
                // 遍历服务器数据的每个属性
                Object.keys(keyMap).forEach((key, index) => {
                    if (key == "cidr") {
                        if (server['hostname'].startsWith("PublicServer_") && server[key] == '') {
                            server[key] = "服务器";
                        }
                    } else if (key == 'tunnel_proto') {
                        server[key] = server[key].replaceAll(",", "</br>");
                    }
                    const cell = document.createElement('td');
                    cell.className = classNameMap[key]?.[server[key]] || server[key];
                    for (const e of Object.keys(valueMap[key] || [])) {
                        if (server[key].startsWith(e)) {
                            server[key] = server[key].replace(e, valueMap[key][e]);
                            break;
                        }
                    }
                    // cell.textContent = server[key]
                    cell.innerHTML = server[key]
                    if (key == 'cidr' && server.ipv4 != '') {
                        cell.title = '点击复制IPv4地址';
                        cell.style.cursor = 'pointer';
                        cell.onclick = async (event) => {
                            const ipv4 = server['ipv4'];  // 获取IPv4地址          
                            copy2CuttingBoard(ipv4);
                            // 阻止事件冒泡
                            event.stopPropagation();
                        };
                    }
                    row.appendChild(cell);
                });
                tableBody.appendChild(row);
            });
        }

        // 从API获取数据
        async function fetchServerData() {
            try {
                const response = await fetch(API_URL + 'peer');
                if (!response.ok) {
                    throw new Error('API调用失败');
                }
                const data = await response.json();
                // data = fallbackData;
                populateTable(data.data);
            } catch (error) {
                console.error('获取数据失败:', error);
                toast('获取数据失败，请检查网络连接', 'error')
            }
        }
        // 下载功能函数
        function downloadWindows() {
            // 模拟下载Windows版本
            const link = document.createElement('a');
            link.href = `${API_URL}download_win_package`;
            link.click();            
            toast('开始下载 Windows 版本');
        }

        function downloadAndroid() {
            const link = document.createElement('a');
            link.href = `${API_URL}download_android_package`;
            link.click();            
            toast('开始下载 Android 版本');
        }

        function downloadConfig() {
            // 创建下载链接
            const link = document.createElement('a');
            link.href = `${API_URL}download_config_file`;
            link.click();
            toast('开始下载配置文件');
        }

        async function copy2CuttingBoard(text) {
            try {
                await navigator.clipboard.writeText(text);
                toast(`已复制到剪贴板: ${text} `, 'success');
            } catch (err) {
                console.error('复制到剪切板失败，继续尝试第二种复制方法:', err)
                // 降级处理                
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();                
                try {
                    document.execCommand('copy');
                    toast(`已复制到剪贴板: ${text} `, 'success');
                } catch (err) {
                    console.error('第二种复制到剪切板失败:', err)
                    toast(`复制失败，请手动复制: ${text} `, 'error');       
                }
                document.body.removeChild(textarea);
            }
            
        }

        // 初始化页面
        generateTableHeader();
        fetchServerData();
        
        // 定时刷新数据（每30秒）
        setInterval(fetchServerData, 10000);
    </script>
</body>
</html>
